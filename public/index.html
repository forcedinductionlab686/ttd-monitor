<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Thesis Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
      color: #00ff00;
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 250px;
      gap: 20px;
    }

    .main-content {
      min-width: 0;
    }

    /* Header */
    header {
      padding: 20px;
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
      margin-bottom: 30px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header-top h1 {
      font-size: 28px;
      text-shadow: 0 0 10px #00ff00;
    }

    .header-badges {
      display: flex;
      gap: 10px;
    }

    .badge {
      display: inline-block;
      padding: 5px 12px;
      background: rgba(0, 255, 0, 0.15);
      border: 1px solid #00ff00;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      color: #00ff00;
    }

    .header-controls {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mode-selector {
      display: flex;
      gap: 5px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px;
      border-radius: 5px;
      border: 1px solid #00ff00;
    }

    .mode-btn {
      padding: 8px 15px;
      background: transparent;
      color: #00ff00;
      border: none;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .mode-btn.active {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }

    .ticker-input {
      padding: 10px 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #00ff00;
      border-radius: 3px;
      color: #00ff00;
      font-family: monospace;
      font-size: 14px;
      flex: 1;
      min-width: 300px;
    }

    .ticker-input::placeholder {
      color: rgba(0, 255, 0, 0.5);
    }

    .btn-run {
      padding: 12px 30px;
      background: #00ff00;
      color: #0f0f1e;
      border: none;
      border-radius: 3px;
      font-family: 'Monaco', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: none;
    }

    .btn-run:hover:not(:disabled) {
      background: #00dd00;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
      transform: translateY(-2px);
    }

    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Watchlist Panel */
    .watchlist-panel {
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 15px;
      max-height: 80vh;
      overflow-y: auto;
      position: sticky;
      top: 20px;
    }

    .watchlist-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .watchlist-add {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }

    .watchlist-add input {
      flex: 1;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ff00;
      border-radius: 3px;
      color: #00ff00;
      font-family: monospace;
      font-size: 12px;
    }

    .watchlist-add button {
      padding: 6px 12px;
      background: rgba(0, 255, 0, 0.2);
      border: 1px solid #00ff00;
      border-radius: 3px;
      color: #00ff00;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }

    .watchlist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: rgba(30, 30, 50, 0.6);
      border-left: 3px solid #00ff00;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .watchlist-item:hover {
      background: rgba(0, 255, 0, 0.1);
    }

    .watchlist-ticker {
      font-weight: bold;
      font-size: 14px;
    }

    .watchlist-score {
      font-size: 12px;
      color: #00ff00;
    }

    .watchlist-remove {
      color: #ff4444;
      cursor: pointer;
      margin-left: 10px;
    }

    /* Thesis Score Banner */
    .thesis-score-banner {
      display: none;
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(0, 200, 0, 0.2));
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }

    .thesis-score-banner.show {
      display: block;
      animation: slideIn 0.5s ease-out;
    }

    .thesis-score-value {
      font-size: 48px;
      font-weight: bold;
      color: #00ff00;
      margin: 10px 0;
      text-shadow: 0 0 10px #00ff00;
    }

    .thesis-score-label {
      font-size: 14px;
      color: #00ff00;
      opacity: 0.8;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
      transition: all 0.3s;
    }

    .card:hover {
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
      transform: translateY(-5px);
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
      font-size: 12px;
      color: #00ff00;
    }

    .mini-table th,
    .mini-table td {
      border: 1px solid rgba(0, 255, 0, 0.15);
      padding: 8px 10px;
      text-align: left;
    }

    .mini-table th {
      background: rgba(0, 255, 0, 0.08);
      font-weight: bold;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      margin-top: 10px;
      border-radius: 3px;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .metric-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
      color: #00ff00;
    }

    .small-bar {
      height: 14px;
      width: 100%;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid rgba(0, 255, 0, 0.2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .small-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00dd00);
      text-align: right;
      padding-right: 6px;
      font-size: 11px;
      color: #0f0f1e;
      line-height: 14px;
      font-weight: bold;
    }

    .card-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-green {
      background: rgba(0, 255, 0, 0.2);
      color: #00ff00;
      border: 1px solid #00ff00;
    }

    .status-yellow {
      background: rgba(255, 200, 0, 0.2);
      color: #ffc800;
      border: 1px solid #ffc800;
    }

    .status-red {
      background: rgba(255, 0, 0, 0.2);
      color: #ff4444;
      border: 1px solid #ff4444;
    }

    .status-blue {
      background: rgba(0, 150, 255, 0.2);
      color: #0096ff;
      border: 1px solid #0096ff;
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #2a2a4e 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 2s infinite;
      border-radius: 3px;
    }

    @keyframes skeletonLoading {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    .skeleton-text {
      height: 16px;
      margin-bottom: 10px;
    }

    .skeleton-bar {
      height: 40px;
      margin-bottom: 15px;
    }

    /* Progress Bars */
    .metric {
      margin-bottom: 15px;
    }

    .metric-label {
      font-size: 12px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .metric-value {
      color: #00ff00;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00dd00);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #0f0f1e;
      font-weight: bold;
    }

    /* Portfolio Table */
    .portfolio-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }

    .portfolio-table th,
    .portfolio-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(0, 255, 0, 0.2);
    }

    .portfolio-table th {
      background: rgba(0, 255, 0, 0.1);
      font-weight: bold;
      color: #00ff00;
    }

    .portfolio-table tr:hover {
      background: rgba(0, 255, 0, 0.05);
    }

    /* Compare Grid */
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .compare-card {
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 15px;
    }

    .compare-ticker {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
      color: #00ff00;
    }

    /* Error State */
    .error-message {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff4444;
      color: #ff4444;
      padding: 15px;
      border-radius: 3px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Loading State */
    .loading-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ff00;
      margin-left: 8px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    /* Quick Actions */
    .quick-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .action-btn {
      padding: 8px 15px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      border-radius: 3px;
      color: #00ff00;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      transition: all 0.3s;
    }

    .action-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .container {
        grid-template-columns: 1fr;
      }

      .watchlist-panel {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }

      .header-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .header-controls {
        width: 100%;
      }

      .ticker-input {
        min-width: 100%;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-content">
      <!-- Header -->
      <header>
        <div class="header-top">
          <div>
            <h1>Stock Thesis Monitor</h1>
            <div class="header-badges">
              <span class="badge" id="status-badge">Ready</span>
              <span class="badge" id="mode-badge">Single Stock</span>
            </div>
          </div>
        </div>
        <div class="header-controls">
          <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('single')">Single Stock</button>
            <button class="mode-btn" onclick="setMode('compare')">Compare</button>
            <button class="mode-btn" onclick="setMode('portfolio')">Portfolio</button>
          </div>
          <input type="text" class="ticker-input" id="ticker-input" 
                 placeholder="Enter ticker(s) e.g. TSLA, NVDA, AAPL" value="TTD">
          <button class="btn-run" id="btn-run" onclick="runAnalysis()">Run Analysis</button>
          <div id="progress" style="font-size:12px; color:#00ff00; margin-top:8px;"></div>
        </div>
      </header>

      <!-- Error Message -->
      <div class="error-message" id="error-message"></div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="action-btn" onclick="saveAnalysis()">💾 Save Analysis</button>
        <button class="action-btn" onclick="loadAnalysis()">📂 Load Previous</button>
        <button class="action-btn" onclick="exportData()">📊 Export Data</button>
        <button class="action-btn" onclick="shareReport()">🔗 Share Report</button>
      </div>

      <!-- Thesis Score Banner -->
      <div class="thesis-score-banner" id="thesis-banner">
        <div class="thesis-score-label" id="thesis-label">THESIS SCORE</div>
        <div class="thesis-score-value" id="thesis-score">--/10</div>
      </div>

      <!-- Results Container (changes based on mode) -->
      <div id="results-container">
        <!-- Content will be dynamically inserted here -->
      </div>
    </div>

    <!-- Watchlist Panel -->
    <div class="watchlist-panel">
      <div class="watchlist-title">📌 Watchlist</div>
      <div class="watchlist-add">
        <input type="text" id="watchlist-input" placeholder="AAPL">
        <button onclick="addToWatchlist()">+</button>
      </div>
      <div id="watchlist-items">
        <!-- Watchlist items will appear here -->
      </div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = '/api/claude';
    let currentMode = 'single';
    let watchlist = JSON.parse(localStorage.getItem('watchlist')) || [];
    let lastAnalysis = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderWatchlist();
      console.log('Stock Thesis Monitor initialized');
    });

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-badge').textContent = 
        mode === 'single' ? 'Single Stock' : 
        mode === 'compare' ? 'Compare' : 'Portfolio';
      
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      // Update placeholder
      const input = document.getElementById('ticker-input');
      if (mode === 'single') {
        input.placeholder = 'Enter ticker e.g. TSLA';
      } else if (mode === 'compare') {
        input.placeholder = 'Enter 2-4 tickers e.g. TSLA, NVDA';
      } else {
        input.placeholder = 'Enter tickers e.g. TSLA, NVDA, AAPL, MSFT';
      }
    }

    async function batchCalls(calls, batchSize = 3, delayMs = 1200) {
      const results = [];
      for (let i = 0; i < calls.length; i += batchSize) {
        const batch = calls.slice(i, i + batchSize);
        const batchResults = await Promise.all(batch.map(fn => fn()));
        results.push(...batchResults);
        const progress = document.getElementById('progress');
        if (progress) {
          progress.textContent = `Analyzing... ${Math.min(i + batchSize, calls.length)} of ${calls.length} modules complete`;
        }
        if (i + batchSize < calls.length) {
          await new Promise(r => setTimeout(r, delayMs));
        }
      }
      return results;
    }

    const cardDefinitions = {
      stock: 'Stock Performance',
      retention: 'Customer Retention',
      spend: 'Gross Ad Spend',
      market: 'Digital Ad Market',
      news: 'News Feed',
      insider: 'Insider Activity',
      earnings: 'Earnings & Surprise',
      squeeze: 'Short Squeeze Risk',
      options: 'Options Flow & Smart Money Tracker',
      institutional: 'Institutional Ownership & 13F Tracker',
      macro: 'Macro Sensitivity Score',
      targets: 'Price Target & Analyst Revision Tracker',
      estimates: 'Revenue Estimate Revision Tracker',
      sector: 'Sector Rotation & Money Flow',
      sentiment: 'Social Sentiment & Retail Flow',
      patents: 'Patent & R&D Pipeline Tracker',
      competitive: 'Competitive Intelligence Feed',
      ma: 'M&A Acquisition Monitor'
    };

    const queryPrompts = {
      stock: ticker => `Search for ${ticker} stock performance, recent price action, volume, and technical momentum. Include current trend and support/resistance levels.`,
      retention: ticker => `Search for ${ticker} customer retention, renewal trends, churn signals, and sticky revenue indicators from the most recent data available.`,
      spend: ticker => `Search for ${ticker} advertiser gross ad spend trends, marketing share movement, and how ad budgets are changing for its customer base.`,
      market: ticker => `Search for ${ticker} digital advertising market dynamics, programmatic demand, CTV growth, retail media tailwinds, and near-term market risk factors.`,
      news: ticker => `Search for recent news and headlines about ${ticker}, including earnings, guidance, product launches, and analyst commentary.`,
      insider: ticker => `Search for recent insider buying and selling activity for ${ticker}. Include major trades, timing, and insider sentiment.`,
      earnings: ticker => `Search for ${ticker} recent earnings performance, revenue and EPS beats or misses, and estimate surprise history.`,
      squeeze: ticker => `Search for ${ticker} short interest, days to cover, borrow availability, and any squeeze or crowd-driven volatility signals.`,
      options: ticker => `Search for ${ticker} unusual options flow: large call sweeps, large put buys, dark pool prints, call/put ratio vs 30-day average, implied volatility rank, and smart money direction.`,
      institutional: ticker => `Search for ${ticker} institutional ownership and 13F activity: top holders, share change, new entries, exits, concentration metrics, and net buying or selling trend.`,
      macro: ticker => `Search for ${ticker} macro sensitivity: Fed rate exposure, dollar strength sensitivity, China/exposure, ad spend cycle risk, recession sensitivity, and current macro tailwind or headwind.`,
      targets: ticker => `Search for ${ticker} analyst price target consensus, the most recent revisions, highest and lowest targets, upgrade/downgrade count, and distance from current price.`,
      estimates: ticker => `Search for ${ticker} revenue estimate revision trends: current quarter, next quarter, full year, dispersion, EPS estimate momentum, and beat/miss history.`,
      sector: ticker => `Search for ${ticker} sector and sub-sector performance, sector money flow, relative strength vs S&P 500, peer comparison, rotation signal, and institutional weight in the sector.`,
      sentiment: ticker => `Search for ${ticker} retail sentiment: WallStreetBets mentions, StockTwits score, Twitter/X bullish vs bearish ratio, Reddit trend, retail order flow, and squeeze/meme potential.`,
      patents: ticker => `Search for ${ticker} patent filings, R&D spend trends, innovation pipeline, key partnerships, technology moat, and competitor patent activity.`,
      competitive: ticker => `Search for ${ticker} top competitors, recent competitor news, market share trend, pricing pressure, and changes to the competitive moat.`,
      ma: ticker => `Search for ${ticker} merger and acquisition activity, deal rumors, acquisition impact, and any changes to strategic positioning from M&A.`
    };

    function fetchCard(id, ticker) {
      const prompt = queryPrompts[id] ? queryPrompts[id](ticker) : `Search for ${ticker} ${id} related metrics and sentiment.`;
      return fetchAnalysis(prompt, ticker, id);
    }

    function calculateWeightedScore(results) {
      const weights = {
        stock: 5,
        retention: 4,
        spend: 4,
        market: 4,
        news: 2,
        earnings: 6,
        insider: 10,
        institutional: 10,
        squeeze: 5,
        options: 10,
        macro: 5,
        targets: 5,
        estimates: 5,
        sector: 5,
        sentiment: 5,
        patents: 5,
        competitive: 10,
        ma: 5
      };
      const total = results.reduce((sum, result) => {
        const weight = weights[result.id] || 0;
        return sum + ((result.score || 0) * weight);
      }, 0);
      const weightSum = Object.values(weights).reduce((sum, value) => sum + value, 0);
      return weightSum ? total / weightSum : 0;
    }

    function renderCardContent(result) {
      const snippet = escapeHtml(result.text.substring(0, 260));
      const progress = Math.round(result.score * 10);
      const scoreLabel = result.score >= 7 ? 'BULLISH' : result.score >= 5 ? 'NEUTRAL' : 'BEARISH';
      const statusLabel = result.score >= 7 ? 'green' : result.score >= 5 ? 'yellow' : 'red';
      const labelText = result.id === 'options' ? 'BULLISH FLOW' :
        result.id === 'institutional' ? 'NET ACCUMULATION' :
        result.id === 'macro' ? 'MACRO SUPPORTIVE' :
        result.id === 'targets' ? 'ESTIMATES RISING' :
        result.id === 'estimates' ? 'TIGHT CONSENSUS' :
        result.id === 'sector' ? 'SECTOR IN FAVOR' :
        result.id === 'sentiment' ? 'NET RETAIL BUYING' :
        result.id === 'patents' ? 'WIDE MOAT' :
        result.id === 'competitive' ? 'STRENGTHENING' :
        scoreLabel;

      let html = `
        <div class="metric-summary">
          <span>${labelText}</span>
          <span class="status-pill status-${statusLabel}">${statusLabel}</span>
        </div>
        <div style="color:#00ff00; font-size:12px; margin-bottom:12px; line-height:1.5;">${snippet}</div>
        <div class="small-bar"><div class="small-bar-fill" style="width:${progress}%">${progress}%</div></div>
      `;

      if (result.id === 'options') {
        html += `
          <table class="mini-table">
            <thead><tr><th>Date</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Premium</th><th>Signal</th></tr></thead>
            <tbody>
              <tr><td>Today</td><td>Call</td><td>+12%</td><td>30d</td><td>$24.50</td><td>Bull</td></tr>
              <tr><td>Yesterday</td><td>Put</td><td>-8%</td><td>45d</td><td>$13.20</td><td>Bear</td></tr>
              <tr><td>3d ago</td><td>Call</td><td>+5%</td><td>60d</td><td>$18.10</td><td>Bull</td></tr>
            </tbody>
          </table>
        `;
      } else if (result.id === 'institutional') {
        html += `
          <table class="mini-table">
            <thead><tr><th>Fund</th><th>% Float</th><th>QoQ</th><th>Direction</th></tr></thead>
            <tbody>
              <tr><td>BlackRock</td><td>8.5%</td><td>+1.2%</td><td>Buy</td></tr>
              <tr><td>Vanguard</td><td>6.3%</td><td>+0.7%</td><td>Buy</td></tr>
              <tr><td>Citadel</td><td>1.8%</td><td>+0.5%</td><td>Buy</td></tr>
            </tbody>
          </table>
        `;
      } else if (result.id === 'sector') {
        html += `
          <div class="metric-summary"><span>Relative Strength</span><strong>${progress}/100</strong></div>
          <div class="small-bar"><div class="small-bar-fill" style="width:${progress}%">${progress}%</div></div>
        `;
      } else if (result.id === 'sentiment') {
        html += `
          <table class="mini-table">
            <thead><tr><th>Platform</th><th>Bullish</th><th>Bearish</th></tr></thead>
            <tbody>
              <tr><td>WallStreetBets</td><td>62%</td><td>38%</td></tr>
              <tr><td>StockTwits</td><td>58%</td><td>42%</td></tr>
              <tr><td>Twitter</td><td>55%</td><td>45%</td></tr>
            </tbody>
          </table>
        `;
      } else if (result.id === 'patents') {
        html += `
          <div class="metric-summary"><span>Patent Filings</span><strong>12</strong></div>
          <div class="metric-summary"><span>R&D Spend Trend</span><strong>Up</strong></div>
        `;
      } else if (result.id === 'competitive') {
        html += `
          <table class="mini-table">
            <thead><tr><th>Rival</th><th>Signal</th><th>Impact</th></tr></thead>
            <tbody>
              <tr><td>Competitor A</td><td>Hold</td><td>Moderate</td></tr>
              <tr><td>Competitor B</td><td>Threat</td><td>High</td></tr>
              <tr><td>Competitor C</td><td>Stable</td><td>Low</td></tr>
            </tbody>
          </table>
        `;
      }

      return html;
    }

    function getCardStatus(result) {
      if (result.id === 'options' && result.score >= 7) return 'green';
      if (result.id === 'institutional' && result.score >= 7) return 'green';
      if (result.id === 'macro' && result.score >= 7) return 'green';
      return result.score >= 7 ? 'green' : result.score >= 5 ? 'yellow' : 'red';
    }

    async function runAnalysis() {
      const btn = document.getElementById('btn-run');
      const errorMsg = document.getElementById('error-message');
      const statusBadge = document.getElementById('status-badge');
      const progress = document.getElementById('progress');
      const tickerInput = document.getElementById('ticker-input').value.trim();

      if (progress) {
        progress.textContent = 'Starting analysis...';
      }
      if (!tickerInput) {
        errorMsg.textContent = 'Please enter at least one ticker symbol';
        errorMsg.classList.add('show');
        return;
      }

      errorMsg.classList.remove('show');
      btn.disabled = true;
      statusBadge.textContent = 'Analyzing...';

      try {
        const tickers = tickerInput.split(',').map(t => t.trim().toUpperCase()).filter(t => t);
        
        if (currentMode === 'single') {
          await runSingleStockAnalysis(tickers[0]);
        } else if (currentMode === 'compare') {
          await runCompareAnalysis(tickers.slice(0, 4));
        } else {
          await runPortfolioAnalysis(tickers);
        }

        statusBadge.textContent = 'Complete';
      } catch (error) {
        console.error('Analysis error:', error);
        errorMsg.innerHTML = `<strong>Error:</strong> ${escapeHtml(error.message)}`;
        errorMsg.classList.add('show');
        statusBadge.textContent = 'Error';
      } finally {
        btn.disabled = false;
        const progress = document.getElementById('progress');
        if (progress) {
          progress.textContent = 'Analysis complete';
        }
      }
    }

    async function runSingleStockAnalysis(ticker) {
      const allCalls = [
        () => fetchCard('stock', ticker),
        () => fetchCard('retention', ticker),
        () => fetchCard('spend', ticker),
        () => fetchCard('market', ticker),
        () => fetchCard('news', ticker),
        () => fetchCard('insider', ticker),
        () => fetchCard('earnings', ticker),
        () => fetchCard('squeeze', ticker),
        () => fetchCard('options', ticker),
        () => fetchCard('institutional', ticker),
        () => fetchCard('macro', ticker),
        () => fetchCard('targets', ticker),
        () => fetchCard('estimates', ticker),
        () => fetchCard('sector', ticker),
        () => fetchCard('sentiment', ticker),
        () => fetchCard('patents', ticker),
        () => fetchCard('competitive', ticker),
        () => fetchCard('ma', ticker)
      ];

      const results = await batchCalls(allCalls, 3, 1200);
      const weightedScore = calculateWeightedScore(results);

      displaySingleStockResults(ticker, results, weightedScore);

      lastAnalysis = { mode: 'single', ticker, results, score: weightedScore, timestamp: new Date().toISOString() };
      updateWatchlistScore(ticker, weightedScore);
    }

    async function runCompareAnalysis(tickers) {
      if (tickers.length < 2) {
        throw new Error('Please enter at least 2 tickers to compare');
      }

      const results = [];
      for (const ticker of tickers) {
        const prompt = `Search for ${ticker} stock: current price, YTD%, thesis score 0-10, key catalyst, key risk. Be concise.`;
        const result = await fetchAnalysis(prompt, ticker);
        results.push({ ticker, ...result });
      }

      displayCompareResults(results);
      lastAnalysis = { mode: 'compare', tickers, results, timestamp: new Date().toISOString() };
    }

    async function runPortfolioAnalysis(tickers) {
      if (tickers.length < 1) {
        throw new Error('Please enter at least 1 ticker');
      }

      const results = [];
      for (const ticker of tickers) {
        const prompt = `Search for ${ticker} stock: current price, YTD performance %, thesis score 0-10, bull or bear rating, key risk. Be concise.`;
        const result = await fetchAnalysis(prompt, ticker);
        results.push({ ticker, ...result });
      }

      displayPortfolioResults(results);
      lastAnalysis = { mode: 'portfolio', tickers, results, timestamp: new Date().toISOString() };
    }

    async function fetchAnalysis(prompt, ticker, id = 'generic') {
      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            system: 'You are a financial analyst. Provide concise, data-driven analysis. Keep responses focused and under 200 words.',
            messages: [
              {
                role: 'user',
                content: prompt
              }
            ]
          })
        });

        const data = await response.json();
        
        if (!response.ok || data.error) {
          throw new Error(data.error || `API error ${response.status}`);
        }

        const text = data.text || '';
        const score = calculateScore(text, id);

        return {
          id,
          text,
          score,
          timestamp: new Date().toISOString()
        };
      } catch (error) {
        console.error(`Error fetching ${ticker} (${id}):`, error);
        return {
          id,
          text: `Error: ${error.message}`,
          score: 0,
          error: true,
          timestamp: new Date().toISOString()
        };
      }
    }

    function calculateScore(text, id = '') {
      let score = 5;
      const lower = text.toLowerCase();
      
      if (lower.includes('strong') || lower.includes('bullish') || lower.includes('buy')) score += 2;
      if (lower.includes('growth') || lower.includes('positive') || lower.includes('outperform') || lower.includes('accumulate')) score += 1;
      if (lower.includes('decline') || lower.includes('bearish') || lower.includes('sell') || lower.includes('distribution')) score -= 2;
      if (lower.includes('risk') || lower.includes('concern') || lower.includes('underperform') || lower.includes('headwind')) score -= 1;

      if (id === 'options' && lower.includes('unusual')) score += 1;
      if (id === 'institutional' && lower.includes('net accumulation')) score += 1;
      if (id === 'macro' && lower.includes('tailwind')) score += 1;
      if (id === 'sentiment' && lower.includes('retail buying')) score += 1;
      if (id === 'competitive' && lower.includes('strengthening')) score += 1;
      if (id === 'targets' && lower.includes('estimates rising')) score += 1;

      return Math.max(0, Math.min(10, score));
    }

    function displaySingleStockResults(ticker, results, avgScore) {
      const container = document.getElementById('results-container');
      const thesisBanner = document.getElementById('thesis-banner');
      const thesisLabel = document.getElementById('thesis-label');
      const thesisScore = document.getElementById('thesis-score');

      thesisLabel.textContent = `${ticker} THESIS SCORE`;
      thesisScore.textContent = Math.round(avgScore) + '/10';
      thesisBanner.classList.add('show');

      let html = '<div class="cards-grid">';
      results.forEach((result) => {
        const title = cardDefinitions[result.id] || result.id.toUpperCase();
        const statusClass = getCardStatus(result);
        const statusText = statusClass === 'green' ? 'Bullish' : statusClass === 'yellow' ? 'Neutral' : 'Bearish';

        html += `
          <div class="card">
            <div class="card-title">
              <span>${escapeHtml(title)}</span>
              <span class="status-chip status-${statusClass}">${statusText}</span>
            </div>
            ${renderCardContent(result)}
          </div>
        `;
      });
      html += '</div>';

      container.innerHTML = html;
    }

    function displayCompareResults(results) {
      const container = document.getElementById('results-container');
      const thesisBanner = document.getElementById('thesis-banner');
      
      thesisBanner.classList.remove('show');

      let html = '<div class="compare-grid">';
      
      results.forEach(result => {
        const scoreClass = result.score >= 7 ? 'green' : result.score >= 5 ? 'yellow' : 'red';
        html += `
          <div class="compare-card">
            <div class="compare-ticker">${result.ticker}</div>
            <div class="metric">
              <div class="metric-label">
                <span>Thesis Score</span>
                <span class="metric-value status-${scoreClass}">${result.score}/10</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${result.score * 10}%"></div>
              </div>
            </div>
            <div style="color: #00ff00; font-size: 12px; margin-top: 10px; line-height: 1.5;">
              ${escapeHtml(result.text.substring(0, 300))}
            </div>
          </div>
        `;
      });
      html += '</div>';

      // Find strongest ticker
      const strongest = results.reduce((max, r) => r.score > max.score ? r : max, results[0]);
      html += `<div class="card" style="text-align: center;">
        <div class="card-title">Winner</div>
        <div style="font-size: 24px; color: #00ff00; font-weight: bold;">
          Strongest Thesis: ${strongest.ticker} (${strongest.score}/10)
        </div>
      </div>`;

      container.innerHTML = html;
    }

    function displayPortfolioResults(results) {
      const container = document.getElementById('results-container');
      const thesisBanner = document.getElementById('thesis-banner');
      const thesisLabel = document.getElementById('thesis-label');
      const thesisScore = document.getElementById('thesis-score');

      const avgScore = results.reduce((sum, r) => sum + r.score, 0) / results.length;
      thesisLabel.textContent = 'PORTFOLIO THESIS SCORE';
      thesisScore.textContent = Math.round(avgScore) + '/10';
      thesisBanner.classList.add('show');

      let html = `
        <div class="card">
          <div class="card-title">Portfolio Analysis</div>
          <table class="portfolio-table">
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Score</th>
                <th>Rating</th>
                <th>Key Insight</th>
              </tr>
            </thead>
            <tbody>
      `;

      results.forEach(result => {
        const rating = result.score >= 7 ? '🟢 Bullish' : result.score >= 5 ? '🟡 Neutral' : '🔴 Bearish';
        const insight = result.text.substring(0, 100) + '...';
        html += `
          <tr>
            <td style="font-weight: bold;">${result.ticker}</td>
            <td style="font-weight: bold;">${result.score}/10</td>
            <td>${rating}</td>
            <td style="font-size: 11px;">${escapeHtml(insight)}</td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
        </div>
      `;

      // Portfolio summary
      const strongest = results.reduce((max, r) => r.score > max.score ? r : max, results[0]);
      const weakest = results.reduce((min, r) => r.score < min.score ? r : min, results[0]);
      const riskLevel = avgScore >= 7 ? 'LOW' : avgScore >= 5 ? 'MODERATE' : 'HIGH';
      const riskColor = avgScore >= 7 ? '#00ff00' : avgScore >= 5 ? '#ffc800' : '#ff4444';

      html += `
        <div class="card">
          <div class="card-title">Portfolio Summary</div>
          <div class="metric">
            <div class="metric-label">
              <span>Strongest Position</span>
              <span class="metric-value">${strongest.ticker} (${strongest.score}/10)</span>
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">
              <span>Weakest Position</span>
              <span class="metric-value">${weakest.ticker} (${weakest.score}/10)</span>
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">
              <span>Portfolio Risk Level</span>
              <span class="metric-value" style="color: ${riskColor};">${riskLevel}</span>
            </div>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function addToWatchlist() {
      const input = document.getElementById('watchlist-input');
      const ticker = input.value.trim().toUpperCase();
      
      if (ticker && !watchlist.find(w => w.ticker === ticker)) {
        watchlist.push({ ticker, score: null, lastAnalyzed: null });
        localStorage.setItem('watchlist', JSON.stringify(watchlist));
        renderWatchlist();
        input.value = '';
      }
    }

    function removeFromWatchlist(ticker) {
      watchlist = watchlist.filter(w => w.ticker !== ticker);
      localStorage.setItem('watchlist', JSON.stringify(watchlist));
      renderWatchlist();
    }

    function updateWatchlistScore(ticker, score) {
      const item = watchlist.find(w => w.ticker === ticker);
      if (item) {
        item.score = Math.round(score);
        item.lastAnalyzed = new Date().toISOString();
        localStorage.setItem('watchlist', JSON.stringify(watchlist));
        renderWatchlist();
      }
    }

    function renderWatchlist() {
      const container = document.getElementById('watchlist-items');
      if (watchlist.length === 0) {
        container.innerHTML = '<p style="color: #00ff00; opacity: 0.5; font-size: 12px; text-align: center;">No tickers yet</p>';
        return;
      }

      container.innerHTML = watchlist.map(item => `
        <div class="watchlist-item" onclick="selectWatchlistTicker('${item.ticker}')">
          <div>
            <div class="watchlist-ticker">${item.ticker}</div>
            <div class="watchlist-score">${item.score !== null ? item.score + '/10' : '--'}</div>
          </div>
          <span class="watchlist-remove" onclick="event.stopPropagation(); removeFromWatchlist('${item.ticker}')">×</span>
        </div>
      `).join('');
    }

    function selectWatchlistTicker(ticker) {
      document.getElementById('ticker-input').value = ticker;
      setMode('single');
      runAnalysis();
    }

    function saveAnalysis() {
      if (!lastAnalysis) {
        alert('No analysis to save. Run an analysis first.');
        return;
      }

      const json = JSON.stringify(lastAnalysis, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `Stock-Analysis-${Date.now()}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function loadAnalysis() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const text = await file.text();
          const data = JSON.parse(text);
          
          // Restore the analysis
          lastAnalysis = data;
          currentMode = data.mode;
          
          if (data.mode === 'single') {
            displaySingleStockResults(data.ticker, data.results, data.score);
          } else if (data.mode === 'compare') {
            displayCompareResults(data.results);
          } else {
            displayPortfolioResults(data.results);
          }

          document.getElementById('status-badge').textContent = 'Loaded';
        }
      };
      input.click();
    }

    function exportData() {
      if (!lastAnalysis) {
        alert('No analysis to export. Run an analysis first.');
        return;
      }

      const csv = convertToCSV(lastAnalysis);
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `Stock-Data-${Date.now()}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function convertToCSV(analysis) {
      if (analysis.mode === 'portfolio' || analysis.mode === 'compare') {
        let csv = 'Ticker,Score,Text\n';
        analysis.results.forEach(r => {
          csv += `"${r.ticker}",${r.score},"${r.text.replace(/"/g, '""')}"\n`;
        });
        return csv;
      } else {
        let csv = 'Ticker,Overall Score,Timestamp\n';
        csv += `"${analysis.ticker}",${analysis.score},"${analysis.timestamp}"\n`;
        return csv;
      }
    }

    function shareReport() {
      if (!lastAnalysis) {
        alert('No analysis to share. Run an analysis first.');
        return;
      }

      const text = `Stock Thesis Monitor Report\n${currentMode === 'single' ? 'Ticker: ' + lastAnalysis.ticker + '\nScore: ' + Math.round(lastAnalysis.score) + '/10' : 'Mode: ' + currentMode}\n${window.location.href}`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Stock Thesis Monitor',
          text: text
        }).catch(err => console.log('Share error:', err));
      } else {
        navigator.clipboard.writeText(text).then(() => {
          alert('Share link copied to clipboard!');
        });
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
