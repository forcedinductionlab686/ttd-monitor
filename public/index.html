<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTD Trade Thesis Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
      color: #00ff00;
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
    }

    .header-left h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ff00;
    }

    .header-badges {
      display: flex;
      gap: 10px;
    }

    .badge {
      display: inline-block;
      padding: 5px 12px;
      background: rgba(0, 255, 0, 0.15);
      border: 1px solid #00ff00;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      color: #00ff00;
    }

    .btn-run {
      padding: 12px 30px;
      background: #00ff00;
      color: #0f0f1e;
      border: none;
      border-radius: 3px;
      font-family: 'Monaco', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: none;
    }

    .btn-run:hover:not(:disabled) {
      background: #00dd00;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
      transform: translateY(-2px);
    }

    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Thesis Score Banner */
    .thesis-score-banner {
      display: none;
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(0, 200, 0, 0.2));
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }

    .thesis-score-banner.show {
      display: block;
      animation: slideIn 0.5s ease-out;
    }

    .thesis-score-value {
      font-size: 48px;
      font-weight: bold;
      color: #00ff00;
      margin: 10px 0;
      text-shadow: 0 0 10px #00ff00;
    }

    .thesis-score-label {
      font-size: 14px;
      color: #00ff00;
      opacity: 0.8;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
      transition: all 0.3s;
    }

    .card:hover {
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
      transform: translateY(-5px);
    }

    .card-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-green {
      background: rgba(0, 255, 0, 0.2);
      color: #00ff00;
      border: 1px solid #00ff00;
    }

    .status-yellow {
      background: rgba(255, 200, 0, 0.2);
      color: #ffc800;
      border: 1px solid #ffc800;
    }

    .status-red {
      background: rgba(255, 0, 0, 0.2);
      color: #ff4444;
      border: 1px solid #ff4444;
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #2a2a4e 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 2s infinite;
      border-radius: 3px;
    }

    @keyframes skeletonLoading {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    .skeleton-text {
      height: 16px;
      margin-bottom: 10px;
    }

    .skeleton-bar {
      height: 40px;
      margin-bottom: 15px;
    }

    /* Progress Bars */
    .metric {
      margin-bottom: 15px;
    }

    .metric-label {
      font-size: 12px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .metric-value {
      color: #00ff00;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00dd00);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #0f0f1e;
      font-weight: bold;
    }

    /* AI Summary */
    .ai-summary-section {
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 30px;
      display: none;
    }

    .ai-summary-section.show {
      display: block;
      animation: slideIn 0.5s ease-out;
    }

    .summary-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .summary-content {
      margin-bottom: 20px;
      line-height: 1.8;
      color: #00ff00;
    }

    .quick-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 8px 15px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      border-radius: 3px;
      color: #00ff00;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      transition: all 0.3s;
    }

    .action-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
    }

    /* News Feed */
    .news-item {
      background: rgba(30, 30, 50, 0.6);
      border-left: 3px solid #00ff00;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 3px;
    }

    .news-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 8px;
    }

    .news-title {
      font-weight: bold;
      flex: 1;
    }

    .sentiment-badge {
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 10px;
      white-space: nowrap;
    }

    .sentiment-bullish {
      background: rgba(0, 255, 0, 0.2);
      color: #00ff00;
      border: 1px solid #00ff00;
    }

    .sentiment-bearish {
      background: rgba(255, 0, 0, 0.2);
      color: #ff4444;
      border: 1px solid #ff4444;
    }

    .sentiment-neutral {
      background: rgba(255, 200, 0, 0.2);
      color: #ffc800;
      border: 1px solid #ffc800;
    }

    .news-text {
      font-size: 13px;
      color: #00ff00;
      opacity: 0.9;
    }

    /* Scorecard */
    .scorecard-section {
      background: rgba(20, 20, 40, 0.8);
      border: 2px solid #00ff00;
      border-radius: 5px;
      padding: 20px;
      display: none;
    }

    .scorecard-section.show {
      display: block;
      animation: slideIn 0.5s ease-out;
    }

    .scorecard-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .pillar {
      margin-bottom: 25px;
    }

    .pillar-name {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .pillar-score {
      color: #00ff00;
    }

    /* Error State */
    .error-message {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff4444;
      color: #ff4444;
      padding: 15px;
      border-radius: 3px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Loading State */
    .loading-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ff00;
      margin-left: 8px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }

      .btn-run {
        align-self: flex-start;
      }

      .thesis-score-value {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="header-left">
        <h1>TTD Trade Thesis Monitor</h1>
        <div class="header-badges">
          <span class="badge">NASDAQ:TTD</span>
          <span class="badge" id="status-badge">Ready</span>
        </div>
      </div>
      <button class="btn-run" id="btn-run" onclick="runAnalysis()">Run Analysis</button>
    </header>

    <!-- Error Message -->
    <div class="error-message" id="error-message"></div>

    <!-- Thesis Score Banner -->
    <div class="thesis-score-banner" id="thesis-banner">
      <div class="thesis-score-label">OVERALL THESIS SCORE</div>
      <div class="thesis-score-value" id="thesis-score">--/10</div>
    </div>

    <!-- Monitoring Cards -->
    <div class="cards-grid" id="cards-grid">
      <!-- Stock Performance Card -->
      <div class="card">
        <div class="card-title">
          <span>Stock Performance</span>
          <span class="status-chip status-green" id="stock-status">Loading</span>
        </div>
        <div id="stock-content">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-bar"></div>
        </div>
      </div>

      <!-- Customer Retention Card -->
      <div class="card">
        <div class="card-title">
          <span>Customer Retention</span>
          <span class="status-chip status-green" id="retention-status">Loading</span>
        </div>
        <div id="retention-content">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-bar"></div>
        </div>
      </div>

      <!-- Gross Ad Spend Card -->
      <div class="card">
        <div class="card-title">
          <span>Gross Ad Spend</span>
          <span class="status-chip status-green" id="gaas-status">Loading</span>
        </div>
        <div id="gaas-content">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-bar"></div>
        </div>
      </div>

      <!-- Digital Ad Market Card -->
      <div class="card">
        <div class="card-title">
          <span>Digital Ad Market</span>
          <span class="status-chip status-green" id="market-status">Loading</span>
        </div>
        <div id="market-content">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-bar"></div>
        </div>
      </div>

      <!-- News Feed Card -->
      <div class="card">
        <div class="card-title">
          <span>News Feed</span>
          <span class="status-chip status-green" id="news-status">Loading</span>
        </div>
        <div id="news-content">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
        </div>
      </div>

      <!-- Thesis Scorecard Card -->
      <div class="card">
        <div class="card-title">
          <span>Thesis Scorecard</span>
          <span class="status-chip status-green" id="scorecard-status">Loading</span>
        </div>
        <div id="scorecard-content">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-bar"></div>
        </div>
      </div>
    </div>

    <!-- AI Summary Section -->
    <div class="ai-summary-section" id="ai-summary">
      <div class="summary-title">
        AI Analysis Summary
        <span class="loading-indicator" id="loading-indicator" style="display: none;"></span>
      </div>
      <div class="summary-content" id="summary-text">
        <!-- Summary will be populated here -->
      </div>
      <div class="quick-actions">
        <button class="action-btn" onclick="copyAnalysis()">Copy Analysis</button>
        <button class="action-btn" onclick="exportData()">Export Data</button>
        <button class="action-btn" onclick="shareReport()">Share Report</button>
      </div>
    </div>

    <!-- Scorecard Section -->
    <div class="scorecard-section" id="scorecard-section">
      <div class="scorecard-title">Detailed Scorecard</div>
      <div id="scorecard-detailed">
        <!-- Scorecard will be populated here -->
      </div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = '/api/claude';

    async function runAnalysis() {
      const btn = document.getElementById('btn-run');
      const errorMsg = document.getElementById('error-message');
      const statusBadge = document.getElementById('status-badge');

      // Clear previous error
      errorMsg.classList.remove('show');
      errorMsg.textContent = '';

      // Disable button
      btn.disabled = true;
      statusBadge.textContent = 'Analyzing...';

      try {
        // Show loading indicators
        showLoadingState();

        // Define 5 parallel queries
        const queries = [
          {
            title: 'Stock Performance',
            id: 'stock',
            prompt: 'Search for recent TTD (The Trade Desk) stock price performance, movement, and technical analysis. Provide key metrics and sentiment.'
          },
          {
            title: 'Customer Retention',
            id: 'retention',
            prompt: 'Search for The Trade Desk customer retention rates, churn metrics, and enterprise client satisfaction data. Focus on recent quarters.'
          },
          {
            title: 'Gross Ad Spend',
            id: 'gaas',
            prompt: 'Search for global gross ad spend trends, market growth rates, and digital advertising expenditure forecasts for 2025-2026.'
          },
          {
            title: 'Digital Ad Market',
            id: 'market',
            prompt: 'Search for digital advertising market trends, programmatic advertising growth, CTV (connected TV) adoption, and retail media expansion.'
          },
          {
            title: 'News Feed',
            id: 'news',
            prompt: 'Search for recent news about The Trade Desk (TTD), earnings reports, product announcements, and industry developments.'
          }
        ];

        // Run 5 parallel fetch calls
        const promises = queries.map(query => 
          fetchAnalysis(query.prompt, query.id, query.title)
        );

        const results = await Promise.all(promises);

        // Aggregate results
        let overallScore = 0;
        let scorecardData = {};
        let summaryText = '';

        results.forEach(result => {
          if (result.score !== undefined) {
            overallScore += result.score / 5;
          }
          if (result.scorecardData) {
            scorecardData = { ...scorecardData, ...result.scorecardData };
          }
          if (result.summary) {
            summaryText += result.summary + '\n\n';
          }
        });

        // Display overall thesis score
        const thesisBanner = document.getElementById('thesis-banner');
        document.getElementById('thesis-score').textContent = Math.round(overallScore) + '/10';
        thesisBanner.classList.add('show');

        // Display AI summary
        displayAISummary(summaryText, overallScore);

        // Display scorecard if available
        if (Object.keys(scorecardData).length > 0) {
          displayScorecard(scorecardData);
        }

        statusBadge.textContent = 'Complete';
      } catch (error) {
        console.error('Analysis error:', error);
        errorMsg.innerHTML = `<strong>Error:</strong> ${escapeHtml(error.message)}<br><br>Check console (F12) for details.`;
        errorMsg.classList.add('show');
        statusBadge.textContent = 'Error';
        
        // Also show error in all card status chips
        document.querySelectorAll('[id$="-status"]').forEach(chip => {
          chip.textContent = 'Error';
          chip.className = 'status-chip status-red';
        });
      } finally {
        btn.disabled = false;
      }
    }

    async function fetchAnalysis(prompt, cardId, cardTitle) {
      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            system: 'You are a financial analyst for The Trade Desk (TTD). Provide concise, data-driven analysis with specific metrics when available. Keep responses focused and actionable.',
            messages: [
              {
                role: 'user',
                content: prompt
              }
            ]
          })
        });

        const data = await response.json();
        
        // Check for errors in response
        if (!response.ok || data.error) {
          const errorMsg = data.error || data.details || `API error ${response.status}`;
          throw new Error(errorMsg);
        }

        const analysisText = data.text || '';

        // Parse response and update card
        const { content, status, score, metrics, news, pillars } = parseAnalysisResponse(analysisText, cardId);

        // Update card UI
        updateCardUI(cardId, content, status, metrics, news);

        // Return data for aggregation
        return {
          score: score || 7,
          summary: extractSummary(analysisText),
          scorecardData: pillars ? { [cardId]: { score, metrics: pillars } } : {}
        };
      } catch (error) {
        console.error(`Error fetching ${cardId}:`, error);
        updateCardError(cardId, error.message);
        return { score: 0, summary: '', scorecardData: {} };
      }
    }

    function parseAnalysisResponse(text, cardId) {
      // Extract metrics from response text
      const content = text;
      let status = 'green';
      let score = 7;
      let metrics = [];
      let news = [];
      let pillars = null;

      // Simple heuristics for status and score
      if (text.toLowerCase().includes('decline') || text.toLowerCase().includes('negative') || text.toLowerCase().includes('down')) {
        status = 'red';
        score = 4;
      } else if (text.toLowerCase().includes('stable') || text.toLowerCase().includes('moderate') || text.toLowerCase().includes('neutral')) {
        status = 'yellow';
        score = 6;
      } else if (text.toLowerCase().includes('growth') || text.toLowerCase().includes('positive') || text.toLowerCase().includes('strong')) {
        status = 'green';
        score = 8;
      }

      // Extract metrics (mock parsing - in real app, would be more sophisticated)
      if (cardId === 'stock') {
        metrics = [
          { label: 'Price Movement', value: '5-15%' },
          { label: 'Volume Trend', value: 'Strong' }
        ];
      } else if (cardId === 'retention') {
        metrics = [
          { label: 'Net Retention Rate', value: '110-120%' },
          { label: 'Churn Rate', value: '<5%' }
        ];
      } else if (cardId === 'gaas') {
        metrics = [
          { label: 'YoY Growth', value: '8-12%' },
          { label: 'Market Forecast', value: '2025+' }
        ];
      } else if (cardId === 'market') {
        metrics = [
          { label: 'Programmatic Shift', value: '60-70%' },
          { label: 'CTV Growth', value: '20-30%' }
        ];
      } else if (cardId === 'news') {
        news = extractNewsItems(text);
      }

      pillars = {
        'Technology': score,
        'Market': score + (Math.random() - 0.5) * 2,
        'Execution': score,
        'Valuation': score - 1
      };

      return { content, status, score, metrics, news, pillars };
    }

    function extractNewsItems(text) {
      // Mock news extraction
      const sentences = text.split('.').slice(0, 3);
      return sentences.map((sentence, idx) => ({
        title: sentence.trim().substring(0, 80),
        sentiment: ['bullish', 'neutral', 'bearish'][idx % 3]
      })).filter(item => item.title.length > 10);
    }

    function extractSummary(text) {
      // Return first 200 characters as summary
      return text.substring(0, 500) || 'Analysis complete. Check individual cards for details.';
    }

    function updateCardUI(cardId, content, status, metrics, news) {
      const statusMap = { 'green': 'Bullish', 'yellow': 'Neutral', 'red': 'Bearish' };
      const statusChip = document.getElementById(`${cardId}-status`);
      const contentDiv = document.getElementById(`${cardId}-content`);

      if (statusChip) {
        statusChip.textContent = statusMap[status];
        statusChip.className = `status-chip status-${status}`;
      }

      let html = '';

      if (cardId === 'news') {
        html = news.map(item => `
          <div class="news-item">
            <div class="news-header">
              <div class="news-title">${escapeHtml(item.title)}</div>
              <span class="sentiment-badge sentiment-${item.sentiment}">${item.sentiment.toUpperCase()}</span>
            </div>
          </div>
        `).join('');
      } else {
        html = `<p style="margin-bottom: 15px; color: #00ff00;">${escapeHtml(content.substring(0, 300))}</p>`;
        metrics.forEach((metric, idx) => {
          const percentage = (50 + Math.random() * 40);
          html += `
            <div class="metric">
              <div class="metric-label">
                <span>${escapeHtml(metric.label)}</span>
                <span class="metric-value">${escapeHtml(metric.value)}</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${percentage}%"></div>
              </div>
            </div>
          `;
        });
      }

      if (contentDiv) {
        contentDiv.innerHTML = html;
      }
    }

    function updateCardError(cardId, errorMessage) {
      const statusChip = document.getElementById(`${cardId}-status`);
      const contentDiv = document.getElementById(`${cardId}-content`);

      if (statusChip) {
        statusChip.textContent = 'Error';
        statusChip.className = 'status-chip status-red';
      }

      if (contentDiv) {
        contentDiv.innerHTML = `<p style="color: #ff4444;">Error: ${escapeHtml(errorMessage)}</p>`;
      }
    }

    function showLoadingState() {
      // Show skeleton loaders in all cards
      document.querySelectorAll('.card').forEach(card => {
        const titleSpan = card.querySelector('.card-title span');
        if (titleSpan) {
          // Skeleton loader is already shown by default
        }
      });
    }

    function displayAISummary(summaryText, score) {
      const aiSummarySection = document.getElementById('ai-summary');
      const summaryContentDiv = document.getElementById('summary-text');

      summaryContentDiv.innerHTML = `<p>${escapeHtml(summaryText.substring(0, 800))}</p>`;
      aiSummarySection.classList.add('show');
    }

    function displayScorecard(scorecardData) {
      const scorecardSection = document.getElementById('scorecard-section');
      const scorecardDetailed = document.getElementById('scorecard-detailed');

      let html = '';
      let totalScore = 0;
      let pillarCount = 0;

      Object.entries(scorecardData).forEach(([cardId, data]) => {
        if (data.metrics) {
          Object.entries(data.metrics).forEach(([pillarName, score]) => {
            totalScore += score;
            pillarCount++;
            const percentage = (score / 10) * 100;
            html += `
              <div class="pillar">
                <div class="pillar-name">
                  <span>${escapeHtml(pillarName)}</span>
                  <span class="pillar-score">${score.toFixed(1)}/10</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${percentage}%"></div>
                </div>
              </div>
            `;
          });
        }
      });

      if (pillarCount === 0) {
        // Create default scorecards
        const pillars = ['Technology', 'Market Position', 'Financial Health', 'Growth Potential'];
        pillars.forEach(pillar => {
          const score = 7 + Math.random() * 2;
          const percentage = (score / 10) * 100;
          html += `
            <div class="pillar">
              <div class="pillar-name">
                <span>${pillar}</span>
                <span class="pillar-score">${score.toFixed(1)}/10</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${percentage}%"></div>
              </div>
            </div>
          `;
        });
      }

      scorecardDetailed.innerHTML = html;
      scorecardSection.classList.add('show');
    }

    function copyAnalysis() {
      const summaryText = document.getElementById('summary-text').innerText;
      navigator.clipboard.writeText(summaryText).then(() => {
        alert('Analysis copied to clipboard!');
      }).catch(() => {
        alert('Failed to copy analysis');
      });
    }

    function exportData() {
      const timestamp = new Date().toISOString();
      const score = document.getElementById('thesis-score').innerText;
      const summary = document.getElementById('summary-text').innerText;

      const data = {
        timestamp,
        thesisScore: score,
        analysis: summary,
        exportedAt: new Date().toLocaleString()
      };

      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `TTD-Analysis-${Date.now()}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function shareReport() {
      const score = document.getElementById('thesis-score').innerText;
      const text = `TTD Trade Thesis Monitor Report\nOverall Score: ${score}\n${window.location.href}`;
      
      if (navigator.share) {
        navigator.share({
          title: 'TTD Trade Thesis Monitor',
          text: text
        }).catch(err => console.log('Share error:', err));
      } else {
        alert('Share this report:\n\n' + text);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      console.log('TTD Trade Thesis Monitor initialized');
      // You can add initial setup here
    });
  </script>
</body>
</html>
